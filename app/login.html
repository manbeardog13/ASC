<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ASC — Prijava</title>
<meta name="theme-color" content="#eef0f1">
<script>try{if(localStorage.getItem('asc.theme')==='dark'){document.documentElement.classList.add('dark');document.querySelector('meta[name="theme-color"]').content='#020305';}}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
/* Login — iPhone-calm: ambient canvas, a floating glass card, Google-first. */
body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:22px}
.auth-card{position:relative;z-index:1;width:min(412px,100%);border-radius:30px;padding:30px 26px 24px;
  background:var(--shell-solid);border:1px solid var(--rim);border-top-color:var(--rim-top);
  box-shadow:var(--shadow-card);animation:sheetIn 560ms var(--smooth) both}
@supports ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .auth-card{background:var(--shell);-webkit-backdrop-filter:blur(34px) saturate(150%) brightness(108%);backdrop-filter:blur(34px) saturate(150%) brightness(108%)}
}
.auth-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.auth-logo{height:26px;width:auto;filter:drop-shadow(0 3px 8px rgba(255,78,27,.28))}
.auth-theme{width:34px;height:34px;border-radius:50%;border:0;cursor:pointer;background:var(--panel);display:grid;place-items:center;transition:transform 380ms var(--smooth),background 380ms var(--smooth)}
.auth-theme:active{transform:scale(.92)}
.auth-theme i{width:11px;height:11px;border-radius:50%;background:var(--ink);display:block;transition:box-shadow .38s ease,background .38s ease}
html.dark .auth-theme i{background:transparent;box-shadow:inset 0 0 0 2.4px var(--ink)}
.auth-title{font:600 24px Sora;letter-spacing:-.02em;color:var(--ink)}
.auth-sub{font:500 13.5px Inter;color:var(--muted);margin:3px 0 20px}

.btn-google{width:100%;min-height:50px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;
  border:1px solid var(--line);border-radius:14px;background:var(--panel-2);color:var(--ink);font:650 14.5px Inter;
  box-shadow:0 2px 8px -4px rgba(20,18,15,.2);transition:transform 140ms var(--snap),background .2s var(--smooth),border-color .2s}
.btn-google:active{transform:scale(.985)}
@media(hover:hover){ .btn-google:hover{border-color:var(--lava-ring);background:var(--panel)} }
.btn-google svg{flex:none}

.auth-div{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font:600 11px Inter;letter-spacing:.08em;text-transform:uppercase}
.auth-div::before,.auth-div::after{content:"";height:1px;flex:1;background:var(--line)}

.fieldx{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0 12px;margin-bottom:11px;transition:border-color .2s var(--smooth)}
.fieldx:focus-within{border-color:var(--lava-ring)}
.fieldx .fx-ic{flex:none;color:var(--muted);display:grid;place-items:center}
.fieldx input{flex:1;min-width:0;border:0;background:none;outline:none;font:500 15px Inter;color:var(--ink);padding:14px 0}
.fieldx input::placeholder{color:var(--muted);opacity:.85}
.fx-eye{flex:none;border:0;background:none;cursor:pointer;color:var(--muted);padding:6px;display:grid;place-items:center}
.auth-names{display:none;gap:11px}
body.signup .auth-names{display:flex}
body.signup .auth-names .fieldx{flex:1;margin-bottom:11px}

.auth-forgot-row{display:flex;justify-content:flex-end;margin:-2px 0 12px}
.auth-forgot{background:none;border:0;cursor:pointer;font:600 12.5px Inter;color:var(--muted);padding:2px}
@media(hover:hover){ .auth-forgot:hover{color:var(--lava-ink)} }
body.signup .auth-forgot-row,body.recover .auth-forgot-row{display:none}

.btn-amber{width:100%;min-height:50px;display:flex;align-items:center;justify-content:center;gap:8px;border:0;cursor:pointer;border-radius:14px;color:#fff;font:700 15px Inter;
  background:linear-gradient(160deg,var(--lava-2),var(--lava) 52%,var(--lava-ink));
  box-shadow:0 12px 26px -10px rgba(255,78,27,.6),inset 0 1px 0 rgba(255,255,255,.28);transition:transform 140ms var(--snap),filter .2s}
.btn-amber:active{transform:scale(.98)}
.btn-amber[disabled]{opacity:.6;cursor:progress}
@media(hover:hover){ .btn-amber:hover{filter:brightness(1.04)} }

.auth-switch{text-align:center;margin:16px 0 0;font:500 13px Inter;color:var(--muted)}
.auth-switch button{background:none;border:0;cursor:pointer;font:700 13px Inter;color:var(--lava-ink);padding:0}
.auth-msg{min-height:18px;margin:12px 0 0;font:600 12.5px/1.4 Inter;text-align:center}
.auth-msg.err{color:var(--lava-ink)}
.auth-msg.ok{color:var(--green-ink)}
/* signup + recover only ever show what they need */
body.reset .fieldx.f-pass,body.reset .btn-google,body.reset .auth-div,body.reset .auth-switch{display:none}
body.recover .fieldx.f-email,body.recover .btn-google,body.recover .auth-div,body.recover .auth-switch{display:none}
</style>
</head>
<body>
<span class="canvas" aria-hidden="true"></span>
<span class="grain" aria-hidden="true"></span>

<main>
  <div class="auth-card">
    <div class="auth-top">
      <img class="auth-logo" src="assets/logo.png" alt="ASC — Auto servisni centar">
      <button class="auth-theme" id="theme" type="button" aria-label="Tema"><i></i></button>
    </div>
    <h1 class="auth-title" id="title">Dobrodošli natrag</h1>
    <p class="auth-sub" id="sub">Hotel za gume · Dubrovnik</p>

    <button class="btn-google" id="google" type="button">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      Nastavi s Google
    </button>
    <div class="auth-div" id="divider">ili email</div>

    <form id="form" autocomplete="on">
      <div class="auth-names">
        <label class="fieldx"><span class="fx-ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20a7.5 7.5 0 0115 0"/></svg></span>
          <input id="first" type="text" autocomplete="given-name" placeholder="Ime"></label>
        <label class="fieldx"><span class="fx-ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20a7.5 7.5 0 0115 0"/></svg></span>
          <input id="last" type="text" autocomplete="family-name" placeholder="Prezime"></label>
      </div>
      <label class="fieldx f-email"><span class="fx-ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3.5 7l8.5 6 8.5-6"/></svg></span>
        <input id="email" type="email" inputmode="email" autocomplete="email" required placeholder="Email"></label>
      <label class="fieldx f-pass"><span class="fx-ic"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2.5"/><path d="M8 10.5V8a4 4 0 018 0v2.5"/></svg></span>
        <input id="password" type="password" autocomplete="current-password" required placeholder="Lozinka">
        <button class="fx-eye" id="eye" type="button" aria-label="Prikaži lozinku"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg></button></label>

      <div class="auth-forgot-row"><button class="auth-forgot" id="forgot" type="button">Zaboravljena lozinka?</button></div>
      <button class="btn-amber" id="submit" type="submit">Prijavi se
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
      <p class="auth-msg" id="msg" role="status" aria-live="polite"></p>
    </form>

    <p class="auth-switch" id="switchRow">Prvi put? <button id="switch" type="button">Napravi račun</button></p>
  </div>
</main>

<script type="module">
  import { supabase, isConfigured } from '../js/supabaseClient.js';
  import { getSession, signIn, signUp, sendPasswordReset, updatePassword } from '../js/db.js';

  const $ = (id) => document.getElementById(id);
  const form = $('form'), msg = $('msg'), submit = $('submit'), title = $('title'), sub = $('sub'), switchBtn = $('switch');
  let mode = 'signin';   // signin | signup | reset | recover

  const say = (text, kind) => { msg.textContent = text || ''; msg.className = 'auth-msg' + (kind ? ' ' + kind : ''); };
  const busy = (on) => { submit.disabled = on; $('google').disabled = on; };
  const REMEMBER = 'asc.rememberEmail';

  // Theme toggle (login-scoped, persisted; the app reads asc.theme too).
  $('theme').addEventListener('click', () => {
    const dark = document.documentElement.classList.toggle('dark');
    document.querySelector('meta[name="theme-color"]').content = dark ? '#020305' : '#eef0f1';
    try { localStorage.setItem('asc.theme', dark ? 'dark' : 'light'); } catch (e) {}
  });
  // Show / hide password
  $('eye').addEventListener('click', () => {
    const p = $('password'); p.type = p.type === 'password' ? 'text' : 'password';
  });

  if (!isConfigured()) { say('Aplikacija još nije povezana s bazom (config.js).', 'err'); busy(true); }

  // Prefill the last email used.
  try { const s = localStorage.getItem(REMEMBER); if (s) $('email').value = s; } catch (e) {}

  // Recovery / invite links land back with type=recovery in the hash → set-password.
  const hash = new URLSearchParams(location.hash.slice(1));
  if (hash.get('type') === 'recovery') setMode('recover');
  else getSession().then((session) => { if (session) location.replace('dashboard.html'); }).catch(() => {});

  function setMode(next) {
    mode = next;
    document.body.className = next === 'signin' ? '' : next;
    const map = {
      signin:  { t: 'Dobrodošli natrag', s: 'Hotel za gume · Dubrovnik', btn: 'Prijavi se',      pass: 'Lozinka' },
      signup:  { t: 'Novi račun',         s: 'Napravi svoj ASC račun',    btn: 'Napravi račun',   pass: 'Lozinka' },
      reset:   { t: 'Reset lozinke',      s: 'Poslat ćemo ti link',       btn: 'Pošalji link',    pass: 'Lozinka' },
      recover: { t: 'Nova lozinka',       s: 'Postavi novu lozinku',      btn: 'Spremi lozinku',  pass: 'Nova lozinka' },
    }[next];
    title.textContent = map.t; sub.textContent = map.s;
    submit.firstChild.textContent = map.btn + ' ';
    $('password').placeholder = map.pass;
    $('password').autocomplete = next === 'signin' ? 'current-password' : 'new-password';
    switchBtn.textContent = next === 'signin' ? 'Napravi račun' : 'Imaš račun? Prijavi se';
    $('switchRow').firstChild.textContent = next === 'signin' ? 'Prvi put? ' : ' ';
    say('');
  }

  switchBtn.addEventListener('click', () => setMode(mode === 'signup' ? 'signin' : 'signup'));
  $('forgot').addEventListener('click', () => setMode(mode === 'reset' ? 'signin' : 'reset'));

  // Continue with Google — return to THIS staging app (not the mock root).
  $('google').addEventListener('click', async () => {
    say(''); busy(true);
    const redirectTo = location.href.split('#')[0].split('?')[0];
    const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
    if (error) { say(/not enabled|provider/i.test(error.message) ? 'Google prijava još nije uključena u Supabase.' : error.message, 'err'); busy(false); }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = $('email').value.trim(), password = $('password').value;
    const name = [$('first').value.trim(), $('last').value.trim()].filter(Boolean).join(' ');
    busy(true);
    try {
      if (mode === 'signin') {
        await signIn(email, password);
        try { localStorage.setItem(REMEMBER, email); } catch (e2) {}
        location.replace('dashboard.html');
      } else if (mode === 'signup') {
        const { needsConfirm } = await signUp(email, password, name);
        if (needsConfirm) { say('Račun napravljen — provjeri email za potvrdu, pa se prijavi.', 'ok'); setMode('signin'); }
        else location.replace('dashboard.html');
      } else if (mode === 'reset') {
        await sendPasswordReset(email);
        say('Link za reset poslan na ' + email + '.', 'ok'); setMode('signin');
      } else if (mode === 'recover') {
        await updatePassword(password);
        say('Lozinka spremljena — prijavljujem te…', 'ok');
        setTimeout(() => location.replace('dashboard.html'), 700);
      }
    } catch (err) {
      say(err.message || 'Nešto je pošlo po zlu — pokušaj ponovno.', 'err');
    } finally { busy(false); }
  });
</script>
</body>
</html>
