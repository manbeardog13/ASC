<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ASC — Ploča</title>
<meta name="theme-color" content="#020305">
<link rel="icon" href="app/assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="app/assets/apple-touch-icon.png">
<!-- DELIVERY BUILD (2026-07-09): the root opens the real app under app/ — the
     Prag splash covers the hop, the auth gate lands unauthenticated visitors on
     the login card. Client-side replace() keeps the service worker's
     network-first navigation happy (no HTTP redirect for it to refuse to
     cache); the meta refresh + the visible link are no-JS fallbacks. -->
<script>
// Path-aware: when an offline service worker answers a deep /app/ navigation
// with this page, a bare relative redirect would resolve to app/app/… and loop.
// The timestamp guard is a hard stop: if we land back here within 3s of already
// redirecting (a precache hole bouncing us), we give up and show the manual
// button below instead of spinning forever.
(function(){
  var now = Date.now(), KEY = 'asc.redir.ts';
  try {
    if (now - (+sessionStorage.getItem(KEY) || 0) < 3000) return;
    sessionStorage.setItem(KEY, String(now));
  } catch(e){}
  var p = location.pathname;
  var base = p.indexOf('/app/') >= 0 ? p.slice(0, p.indexOf('/app/') + 1) : p.replace(/[^\/]*$/, '');
  location.replace(base + 'app/dashboard.html');
})();
</script>
<style>
  html,body{height:100%;margin:0}
  body{background:#020305;color:#f4f5f7;font-family:"Inter",system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .b{max-width:340px;padding:24px}
  .m{font-weight:800;font-size:26px;letter-spacing:2px;color:#ff4e1b;margin-bottom:14px}
  p{color:#9aa0ac;font-size:14px;line-height:1.5;margin:0 0 20px}
  a{display:inline-block;min-height:46px;line-height:46px;padding:0 22px;border-radius:999px;
    background:#ff4e1b;color:#fff;font-weight:700;font-size:15px;text-decoration:none}
</style>
</head>
<body>
  <div class="b">
    <div class="m">ASC</div>
    <p>Otvaram ploču…</p>
    <a href="app/dashboard.html">Otvori ploču →</a>
  </div>
</body>
</html>
