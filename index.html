<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>ASC</title>
  <meta name="description" content="ASC — check in, locate, move and retrieve customer tire sets.">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0d0f13">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <meta name="apple-mobile-web-app-title" content="ASC Tires">
  <!-- Intentionally NOT apple-mobile-web-app-capable: iOS standalone mode has
       WebKit camera bugs. The home-screen icon opens in Safari, where the QR
       scanner is reliable. Android still installs standalone via the manifest. -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;800;900&display=swap">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Third-party globals: QR generation + camera scanning -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div id="app-root">
    <noscript><div style="padding:24px;font-family:sans-serif">ASC needs JavaScript enabled.</div></noscript>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
    }
  </script>
</body>
</html>
