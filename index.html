<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>ASC</title>
  <meta name="description" content="ASC — check in, locate, move and retrieve customer tire sets.">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f3eee5">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="ASC">
  <!-- Intentionally NOT apple-mobile-web-app-capable: iOS standalone mode has
       WebKit camera bugs. The home-screen icon opens in Safari, where the QR
       scanner is reliable. Android still installs standalone via the manifest. -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;800;900&family=Sora:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Third-party globals: QR generation + camera scanning -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <div id="app-root">
    <noscript><div style="padding:24px;font-family:sans-serif">ASC needs JavaScript enabled.</div></noscript>
  </div>

  <!-- Recovery watchdog (plain script, runs even if the app bundle fails to load).
       If a reload ever serves a broken/stale shell, app.js won't set __ascBooted,
       and after 10s we show a one-tap Reset that clears the service worker + caches
       — so a wedged state never again requires deleting the app from the home screen. -->
  <script>
    window.__ascBooted = false;
    function ascReset(btn){
      if (btn) { btn.disabled = true; btn.textContent = "…"; }
      var reload = function(){ location.reload(); };
      var p = Promise.resolve();
      if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
        p = navigator.serviceWorker.getRegistrations().then(function(rs){ return Promise.all(rs.map(function(r){ return r.unregister(); })); });
      }
      p.then(function(){ return (window.caches && caches.keys) ? caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }) : null; })
       .then(reload, reload);
    }
    setTimeout(function(){
      // Healthy = the bundle ran AND actually painted something. Catches both a
      // failed bundle (__ascBooted false) AND a "booted but blank" wedge (e.g. a
      // hung session read that never rendered) — either way, offer a one-tap reset.
      var root = document.getElementById("app-root");
      var painted = root && (root.querySelector("#main") || root.querySelector("#loginBody")
        || root.querySelector(".login-canvas") || root.querySelector(".login-stage")
        || (root.textContent || "").trim().length > 0);
      if (window.__ascBooted && painted) return;
      var r = root || document.body;
      r.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;'
        + 'font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f3eee5;color:#241f19;text-align:center">'
        + '<div style="max-width:320px">'
        + '<div style="font-weight:800;font-size:24px;letter-spacing:2px;color:#e03a12;margin-bottom:12px">ASC</div>'
        + '<p style="color:#574f44;font-size:15px;line-height:1.5;margin:0 0 20px">Trebamo osvježiti aplikaciju.<br>The app needs to refresh.</p>'
        + '<button onclick="ascReset(this)" style="width:100%;min-height:48px;border:none;border-radius:10px;'
        + 'font-family:inherit;font-size:15px;font-weight:700;color:#fff;cursor:pointer;'
        + 'background:linear-gradient(180deg,#FB923C,#E2560C)">Osvježi · Reset</button></div></div>';
    }, 10000);
  </script>

  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
    }
  </script>
</body>
</html>
