name: Weekly backup verification

# Layer 5 — an untested backup isn't a backup. Decrypts the newest backup and
# checks its integrity (key works, not corrupt, core tables present).
on:
  schedule:
    - cron: "0 3 * * 1"     # 03:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ENC_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Build DB_URL from the password secret (only used to record the result).
      - name: Build database connection string
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -n "$DB_PASSWORD" ]; then
            ENC=$(python3 -c 'import urllib.parse,os;print(urllib.parse.quote(os.environ["DB_PASSWORD"], safe=""))')
            URL="postgresql://postgres.ilnqhlrvchuvpjgptjfx:${ENC}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres"
            echo "::add-mask::$URL"
            echo "DB_URL=$URL" >> "$GITHUB_ENV"
          fi

      - name: Is there a backups branch yet?
        id: check
        run: |
          if git ls-remote --exit-code --heads origin backups >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No backups branch yet — the nightly job hasn't run. Skipping."
          fi

      - name: Fetch encrypted backups
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: backups
          path: _backups

      - name: Verify newest backup (decrypt + integrity)
        if: steps.check.outputs.exists == 'true'
        env:
          BACKUP_DIR: _backups/database_backups/db
        run: bash scripts/verify-restore.sh

      - name: Record verification result
        if: steps.check.outputs.exists == 'true' && always() && env.DB_URL != ''
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            psql "$DB_URL" -c "insert into backup_runs(kind,status,detail,started_at) values('verify','success','weekly integrity check: ${sets:-?} sets', now());" || true
          else
            psql "$DB_URL" -c "insert into backup_runs(kind,status,detail,started_at) values('verify','failed','weekly integrity check failed', now());" || true
          fi
