name: Weekly backup verification

# Layer 5 — an untested backup isn't a backup. Restores the newest encrypted
# dump into a throwaway PostgreSQL, runs integrity checks, then throws it away.
on:
  schedule:
    - cron: "0 3 * * 1"     # 03:00 UTC every Monday
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ENC_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Is there a backups branch yet?
        id: check
        run: |
          if git ls-remote --exit-code --heads origin backups >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No backups branch yet — the nightly job hasn't run. Skipping."
          fi

      - name: Fetch encrypted backups
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: backups
          path: _backups

      - name: Install PostgreSQL 16 client
        if: steps.check.outputs.exists == 'true'
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client-16
          echo "/usr/lib/postgresql/16/bin" >> "$GITHUB_PATH"

      - name: Restore into throwaway DB + integrity checks
        if: steps.check.outputs.exists == 'true'
        env:
          BACKUP_DIR: _backups/database_backups/db
        run: bash scripts/verify-restore.sh

      - name: Record verification result
        if: steps.check.outputs.exists == 'true' && always() && env.DB_URL != ''
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            psql "$DB_URL" -c "insert into backup_runs(kind,status,detail,started_at) values('verify','success','weekly restore test: ${sets:-?} sets', now());" || true
          else
            psql "$DB_URL" -c "insert into backup_runs(kind,status,detail,started_at) values('verify','failed','weekly restore test failed', now());" || true
          fi
